version: '3.8'

services:
  api:
    # Replace with your actual API service configuration
    image: ols-api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ols
    depends_on:
      - db

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - default

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ols
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
