name: CI

# Fast feedback on every push and pull request to main: lint + byte-compile +
# unit tests for the Python app, and a production build of the dashboard.
# No external services (Postgres, Google, Shopify) are required — the tests
# exercise the auth boundary and pure logic only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Byte-compile
        run: python -m compileall -q app

      - name: Run tests
        run: pytest -q

  dashboard:
    name: Dashboard (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No package-lock.json is committed, so use `npm install` (not `npm ci`).
      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build
        working-directory: dashboard
        run: npm run build
