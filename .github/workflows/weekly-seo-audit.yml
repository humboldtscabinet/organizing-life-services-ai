name: Weekly SEO Audit

# Runs the deep SEO audit every Monday at 12:00 UTC (~ 7-8am ET) and opens
# a pull request with the resulting MD + JSON in data/audit_output/.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   GOOGLE_SERVICE_ACCOUNT_JSON  - full contents of credentials/google-service-account.json
#   GA4_PROPERTY_ID              - 396184354
#   GSC_SITE_URL                 - https://organizinglifeservices.com/ (sitemap + URL Inspection target)
# Optional repo secrets for the post-deploy measurement baseline:
#   GBP_LOCATION_ID              - locations/... (GBP API access may still be pending)
#   GTM_ACCOUNT_ID               - numeric GTM account ID
#   GTM_CONTAINER_ID             - numeric GTM container ID
#
# The audit script (data/deep_seo_audit.py) reads GA4_PROPERTY_ID and
# GSC_SITE_URL from the environment and authenticates everything else with
# the service account. It does NOT use any Shopify credentials.
#
# A maintainer should review the PR, synthesize a human-readable audit in
# docs/seo-audits/ if it's a notable run, update the CHANGELOG, then merge.

on:
  schedule:
    # Every Monday at 12:00 UTC
    - cron: "0 12 * * 1"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  run-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight required audit secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: |
          missing=0
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret is not configured."
            missing=1
          fi
          if [ -z "$GA4_PROPERTY_ID" ]; then
            echo "::error::GA4_PROPERTY_ID secret is not configured."
            missing=1
          fi
          if [ -z "$GSC_SITE_URL" ]; then
            echo "::error::GSC_SITE_URL secret is not configured."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write service-account credentials from secret
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > credentials/google-service-account.json
          chmod 600 credentials/google-service-account.json
          python -m json.tool credentials/google-service-account.json >/dev/null
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Run deep SEO audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials/google-service-account.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          DEEP_AUDIT_MAX_URLS: "80"
          DEEP_AUDIT_INSPECT_TOP_N: "20"
        run: |
          python data/deep_seo_audit.py

      - name: Run post-deploy measurement baseline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials/google-service-account.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          GTM_ACCOUNT_ID: ${{ secrets.GTM_ACCOUNT_ID }}
          GTM_CONTAINER_ID: ${{ secrets.GTM_CONTAINER_ID }}
        run: |
          python data/post_deploy_measurement_baseline.py

      - name: Clean up credentials before commit
        if: always()
        run: |
          rm -f credentials/google-service-account.json

      - name: Create pull request with audit results
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(seo): weekly audit run"
          title: "Weekly SEO audit — ${{ github.run_id }}"
          body: |
            Automated weekly SEO audit.

            **Next steps for the maintainer:**
            1. Review the new files under `data/audit_output/`.
            2. Review the generated post-deploy measurement baseline under `docs/seo-audits/`.
            3. Add an entry to `docs/seo-audits/CHANGELOG.md`.
            4. Merge.
          branch: "automation/weekly-seo-audit-${{ github.run_id }}"
          add-paths: |
            data/audit_output/
            docs/seo-audits/
          delete-branch: true
