# =============================================================
# Organizing Life Services AI — Mac mini server compose
# =============================================================
# Usage:
#   docker compose -f docker-compose.server.yml up -d --build
#
# This profile is intentionally more conservative than docker-compose.yml:
# - Postgres is not published to the host.
# - API, dashboard, and n8n bind to localhost by default.
# - FastAPI runs without the development reload server.
# =============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ols-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ols_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-ols_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ols_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ols-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ols_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ols_db}"
      FASTAPI_ENV: "${FASTAPI_ENV:-production}"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env}"
      OLS_API_KEY: "${OLS_API_KEY:?Set OLS_API_KEY in .env}"
      UVICORN_RELOAD: "false"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-/app/credentials/google-service-account.json}"
      GSC_SITE_URL: "${GSC_SITE_URL:-https://www.organizinglifeservices.com}"
      GA4_PROPERTY_ID: "${GA4_PROPERTY_ID:-}"
      GBP_ACCOUNT_ID: "${GBP_ACCOUNT_ID:-}"
      GBP_LOCATION_ID: "${GBP_LOCATION_ID:-}"
      GTM_ACCOUNT_ID: "${GTM_ACCOUNT_ID:-}"
      GTM_CONTAINER_ID: "${GTM_CONTAINER_ID:-}"
      GOOGLE_ADS_CUSTOMER_ID: "${GOOGLE_ADS_CUSTOMER_ID:-}"
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: "${GOOGLE_ADS_LOGIN_CUSTOMER_ID:-}"
      GOOGLE_ADS_DEVELOPER_TOKEN: "${GOOGLE_ADS_DEVELOPER_TOKEN:-}"
      GOOGLE_ADS_REFRESH_TOKEN: "${GOOGLE_ADS_REFRESH_TOKEN:-}"
      GOOGLE_ADS_CLIENT_ID: "${GOOGLE_ADS_CLIENT_ID:-}"
      GOOGLE_ADS_CLIENT_SECRET: "${GOOGLE_ADS_CLIENT_SECRET:-}"
      GOOGLE_SHEETS_SPREADSHEET_ID: "${GOOGLE_SHEETS_SPREADSHEET_ID:-}"
      SHOPIFY_STORE: "${SHOPIFY_STORE:-}"
      SHOPIFY_CLIENT_ID: "${SHOPIFY_CLIENT_ID:-}"
      SHOPIFY_CLIENT_SECRET: "${SHOPIFY_CLIENT_SECRET:-}"
      SHOPIFY_API_VERSION: "${SHOPIFY_API_VERSION:-2024-10}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
      ANTHROPIC_JUDGE_MODEL: "${ANTHROPIC_JUDGE_MODEL:-claude-sonnet-4-20250514}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      XAI_API_KEY: "${XAI_API_KEY:-}"
      LOCAL_LLM_BASE_URL: "${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}"
      LOCAL_LLM_MODEL: "${LOCAL_LLM_MODEL:-gemma4:12b}"
      LOCAL_LLM_LARGE_MODEL: "${LOCAL_LLM_LARGE_MODEL:-gemma4:31b}"
    ports:
      - "127.0.0.1:${FASTAPI_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8000/health/ready\", timeout=5).raise_for_status()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ols-dashboard
    restart: unless-stopped
    environment:
      OLS_API_KEY: "${OLS_API_KEY:?Set OLS_API_KEY in .env}"
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:1.97.1}
    container_name: ols-n8n
    restart: unless-stopped
    environment:
      N8N_PORT: "${N8N_PORT:-5678}"
      N8N_BASIC_AUTH_ACTIVE: "${N8N_BASIC_AUTH_ACTIVE:-true}"
      N8N_BASIC_AUTH_USER: "${N8N_BASIC_AUTH_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD in .env}"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}"
      OLS_API_KEY: "${OLS_API_KEY:?Set OLS_API_KEY in .env}"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
